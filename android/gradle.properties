org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Workaround: pub cache (C:) and project (F:) are on different drives,
# which causes Kotlin incremental compiler to crash when computing
# relative paths. Disable incremental compilation.
kotlin.incremental=false
