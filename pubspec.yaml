name: petcut
description: "AI Pet Food + Supplement Combo Analyzer"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  firebase_core: ^3.0.0
  firebase_analytics: ^11.0.0
  google_generative_ai: ^0.4.7
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.5.5
  connectivity_plus: ^5.0.2
  http: ^1.6.0
  in_app_purchase: ^3.2.3
  flutter_secure_storage: ^9.2.2
  get_it: ^8.0.3
  flutter_markdown: ^0.7.7+1
  uuid: ^4.5.3
  pdf: ^3.10.0
  printing: ^5.12.0
  share_plus: ^7.0.0
  path_provider: ^2.1.0
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - .env
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
